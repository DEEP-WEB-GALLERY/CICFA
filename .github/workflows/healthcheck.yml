# Continuous live-site health monitor.
#
# Runs scripts/healthcheck.sh on a schedule so the site and its static
# dependencies are checked without waiting for a human maintenance pass:
#   - live site returns 200
#   - inline JS still parses
#   - QR CDN reachable
#   - GitHub issue-form templates present in repo AND live (jury / submission intake)
#   - every target="_blank" anchor carries rel="noopener"
#
# SCOPE — RPC/CORS drift is deliberately NOT checked here (HEALTHCHECK_SKIP_RPC=1).
# The site's bounty pool reads the balance from free public Ethereum RPCs, and
# those endpoints block datacenter/cloud IPs: from a GitHub runner all four
# return non-JSON challenge bodies, which the script would read as a total
# outage (false FAIL) even though the site is fine for real browsers. A cloud-IP
# curl is not a faithful *browser* drift signal anyway. RPC/CORS drift — the
# failure class behind DEE-14 (dead cloudflare-eth) and DEE-23 (rate-limited
# 1rpc.io) — is therefore verified by the LOCAL maintenance pass (residential
# IP, env unset), which the Founding Engineer runs each heartbeat. This monitor
# covers the cloud-IP-valid signals above; a red run is a genuine outage.
#
# The exit code is safe to alert on: transient blips (curl 000 / 5xx / 429) are
# retried before they count, so only a real failure trips exit 1 -> failed run
# -> GitHub notification.
#
# NOTE: GitHub disables scheduled workflows after 60 days of *repository*
# inactivity. If runs stop appearing, re-enable it (Actions tab) or push a commit.
name: healthcheck

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily (offset from :00, which GitHub delays)
  workflow_dispatch: {}     # allow manual "Run workflow" from the Actions tab

# Never let two runs overlap.
concurrency:
  group: healthcheck
  cancel-in-progress: false

permissions:
  contents: read            # script only reads the repo + makes outbound requests

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HEALTHCHECK_SKIP_RPC: '1'   # cloud IP: skip the RPC probe (see header)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0    # full history so the repo-state check resolves origin/main cleanly

      # node + python3 + curl + git are all preinstalled on ubuntu-latest;
      # the script only needs `node --check`, so no setup-node step is required.

      - name: Run health check
        shell: bash
        run: |
          set -o pipefail
          bash scripts/healthcheck.sh 2>&1 | tee /tmp/hc.log
          status=${PIPESTATUS[0]}
          {
            echo '### CICFA live-site health'
            echo '```'
            sed -E 's/\x1b\[[0-9;]*m//g' /tmp/hc.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
